<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in — Meta Ads Analytics</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-body">
  <main class="login-main">
    <div class="login-card">
      <div class="login-title">Meta Ads Analytics</div>
      <div class="login-sub">Enter the password to continue.</div>
      <form id="login-form">
        <input type="password" id="password" class="login-input"
               placeholder="Password" autocomplete="current-password" autofocus>
        <div id="login-err" class="login-err" style="display:none"></div>
        <button type="submit" class="primary login-submit">Sign in</button>
      </form>
    </div>
  </main>
  <script src="/js/login.js"></script>
</body>
</html>
